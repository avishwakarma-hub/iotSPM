# Copy to config/settings.local.yaml for private overrides if needed.

base_dir: /mnt/ext_storage/iotSPM

paths:
  raw_dir: /mnt/ext_storage/iotSPM/data/raw
  csv_dir: /mnt/ext_storage/iotSPM/data/csv
  cleaned_dir: /mnt/ext_storage/iotSPM/data/cleaned
  enriched_dir: /mnt/ext_storage/iotSPM/data/enriched
  reports_dir: /mnt/ext_storage/iotSPM/data/reports
  db_path: /mnt/ext_storage/iotSPM/db/iotspm.db
  logs_dir: /mnt/ext_storage/iotSPM/logs
  credentials_dir: /mnt/ext_storage/iotSPM/credentials
  google_credentials_file: /mnt/ext_storage/iotSPM/credentials/credentials.json
  google_token_file: /mnt/ext_storage/iotSPM/credentials/token.json
  deviceatlas_json: /mnt/ext_storage/iotSPM/DeviceAtlas.json
  deviceatlas_python_api_dir: /mnt/ext_storage/iotSPM/deviceatlas-enterprise-python-3.2.1/API

rundeck:
  base_url: https://rundeck.example.com
  project: zanalytics
  security_job_id: 8dbcad77-cc90-4855-a03f-2d9d8a539c07
  weblog_job_id: a6d60171-c4f8-433c-82e4-446af2ebb61d
  # Prefer query-specific job ids in settings.local.yaml when your environment
  # uses different Rundeck jobs for different report templates.
  job_ids:
    build_only: a6d60171-c4f8-433c-82e4-446af2ebb61d
    all_location: a6d60171-c4f8-433c-82e4-446af2ebb61d
    enriched_location: a6d60171-c4f8-433c-82e4-446af2ebb61d
  job_show_url_template: "{base_url}/project/{project}/job/show/{job_id}"
  execution_show_url_template: "{base_url}/project/{project}/execution/show/{execution_id}"
  verify_ssl: false
  username: replace_me
  password: replace_me
  user_agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36
  output_format: CSV
  upload: GoogleDrive
  timezone: GMT
  query_type: web_query
  show_hidden_transaction: "no"
  allow_parallel_runs: false
  log_pagination_limit: 100
  poll_interval_seconds: 300
  long_running_notice_hours: 12
  clouds:
    - zscaler.net
    - zscalertwo.net
    - zscloud.net
    - zscalerone.net
    - zscalerthree.net
    - zscalerbeta.net
  queries:
    build_only: 'from weblog select count(1) where useragent like "Build/" AND userid=locationid AND malsigid=0 group by useragent'
    all_location: 'from weblog select count(1) where userid=locationid AND malsigid=0 group by useragent'
    enriched_location: 'from weblog select count(1), ua_token, mobile_device where userid=locationid AND malsigid=0 group by useragent, ua_token, mobile_device'

scheduler:
  enabled: false
  name: daily_build_only
  query_name: build_only
  # Set this with: python run.py scheduler-set-base --date YYYY-MM-DD
  base_date: ""
  date_lag_days: 1
  max_active_rundeck_runs: 1
  catch_up_enabled: true
  auto_process_succeeded: true
  process_retries_first: true
  lock_timeout_minutes: 180
  max_retries_per_tick: 1

zclient:
  binary: /usr/local/bin/zclient
  timezone: GMT

google_drive:
  scopes:
    # Same OAuth token is used for both operations:
    # - drive.readonly downloads Rundeck-generated report files by id.
    # - drive.file uploads final iotSPM XLSX reports created by this app.
    # Re-run `python run.py auth-drive` if changing scopes on an existing token.
    - https://www.googleapis.com/auth/drive.readonly
    - https://www.googleapis.com/auth/drive.file

report_upload:
  enabled: true
  # Optional Google Drive folder id where final XLSX reports should be uploaded.
  folder_id: ""
  filename: ""

filtering:
  min_ua_length: 5
  max_ua_length: 1000
  min_hits: 1
  keep_top_per_group: 1
  reject_desktop_mobile_tablet: true

deviceatlas:
  cache_ttl_days: 30
  workers: 4
  properties:
    - model
    - vendor
    - primaryHardwareType
    - marketingName
    - browserName
    - osName
    - osVersion
    - isMobilePhone
    - isTablet
    - isRobot

spm:
  enabled: true
  url: https://z-intel-plus.corp.zscaler.com/
  api_key: replace_me
  workers: 10
  request_timeout_seconds: 45
  request_retries: 3
  retry_backoff_seconds: 5
  retry_status_codes: [429, 500, 502, 503, 504]
  # Keep the review report moving when only a few UAs fail after retries.
  # Failed rows are marked spm-error with the error JSON for manual retry/review.
  continue_on_error: true

spm_export:
  enabled: true
  auto_sync: true
  use_in_stage6: true
  required: false
  # Uses spm.url and spm.api_key by default. Override here only if export API differs.
  api_url: ""
  api_key: ""
  verify_ssl: true
  request_timeout_seconds: 60
  # "latest" performs one lightweight API check each pipeline run and rebuilds KB
  # only when the latest approved export id changes.
  export_id: latest
  zip_password_prefix: export_
  spm_filename: phrases_req_uri.spm
  exports_dir: /mnt/ext_storage/iotSPM/data/spm_exports
  kb_cache_path: /mnt/ext_storage/iotSPM/data/spm_knowledge_base.json

cleanup:
  delete_raw_current_after_convert: true
  delete_csv_after_filter: true
  delete_download_after_done: true

smtp:
  enabled: true
  host: smtp.example.com
  port: 587
  use_tls: true
  username: replace_me
  password: replace_me
  alert_email_from: alerts@example.com
  alert_email_to:
    - researcher@example.com